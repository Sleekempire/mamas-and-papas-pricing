services:
  - type: web
    name: mamas-and-papas-pricing
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && PYTHONPATH=. uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
