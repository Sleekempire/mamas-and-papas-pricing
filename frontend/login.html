<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mamas & Papas Pricing — Secure enterprise dynamic pricing platform login">
  <title>Sign In — Mamas & Papas Pricing</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <img src="images/logo.png" alt="Mamas &amp; Papas"
        style="max-width:130px;max-height:80px;object-fit:contain;border-radius:8px;background:#fff;padding:6px 10px;">
      <h1 style="font-size:1.1rem;letter-spacing:0.04em;opacity:0.7;font-weight:400;">Pricing Intelligence Platform</h1>
    </div>
    <p class="login-subtitle">Internal commercial analytics platform. Authorised users only.</p>

    <div id="login-error" class="login-error hidden"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" name="email" type="email" class="form-input" placeholder="you@company.internal"
          autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-input" placeholder="Enter your password"
          autocomplete="current-password" required>
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary">
        <span id="login-btn-text">Sign In</span>
        <span id="login-spinner" class="spinner hidden"></span>
      </button>
    </form>

    <div class="login-roles">
      <p class="login-roles-label">Demo credentials (click to fill)</p>
      <div class="login-roles-grid">
        <div class="demo-cred" data-email="admin@pricing.internal" data-pass="Admin123!">🔑 Admin</div>
        <div class="demo-cred" data-email="analyst@pricing.internal" data-pass="Analyst123!">📈 Analyst</div>
        <div class="demo-cred" data-email="merch@pricing.internal" data-pass="Merch123!">🏷 Merchandiser</div>
        <div class="demo-cred" data-email="viewer@pricing.internal" data-pass="Viewer123!">👁 Viewer</div>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8082/api/v1';

    document.querySelectorAll('.demo-cred').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById('email').value = el.dataset.email;
        document.getElementById('password').value = el.dataset.pass;
      });
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const txt = document.getElementById('login-btn-text');
      const spin = document.getElementById('login-spinner');
      const errBox = document.getElementById('login-error');
      errBox.classList.add('hidden');

      btn.disabled = true; txt.textContent = 'Signing in…'; spin.classList.remove('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const body = new URLSearchParams({ username: email, password });
        const res = await fetch(`${API}/auth/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString(),
        });
        if (!res.ok) throw new Error((await res.json()).detail || 'Login failed');
        const data = await res.json();

        // Store token in sessionStorage (cleared on tab close)
        sessionStorage.setItem('access_token', data.access_token);
        sessionStorage.setItem('user_role', data.role);
        sessionStorage.setItem('user_email', email);

        window.location.href = 'index.html';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove('hidden');
      } finally {
        btn.disabled = false; txt.textContent = 'Sign In'; spin.classList.add('hidden');
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('access_token')) window.location.href = 'index.html';
  </script>
</body>

</html>
